version: "2.0"
policy_name: "lumis1_qwen35_thinking_off"

enforcement:
  require_chat_template_kwargs: true
  require_enable_thinking_key: true
  require_enable_thinking_false: true
  fail_if_missing_eos_alignment: true
  fail_if_cot_markers_present: true

allowed_template:
  family: "qwen3.5"
  template_id: "qwen35_unsloth"
  expected_chat_template_kwargs:
    enable_thinking: false
  eos_token_policy: "must_match_tokenizer_eos"

disallowed_markers:
  - "<think>"
  - "</think>"
  - "Chain-of-thought:"
  - "Let's think step by step"
  - "reasoning trace"
  - "scratchpad"
